# Recommended Gradle settings for faster local builds
# These are safe for local development and improve incremental build performance.

# Keep the Gradle daemon enabled to avoid JVM cold-starts between builds
org.gradle.daemon=true

# Enable parallel task execution where possible
org.gradle.parallel=true

# Configure projects on demand to avoid configuring unused projects
org.gradle.configureondemand=true

# Enable Gradle build cache (reuses task outputs between builds)
org.gradle.caching=true

# JVM args for the Gradle daemon - adjust -Xmx as appropriate for your machine
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# Optional: disable Gradle's automatic download of build scans (keep local)
org.gradle.scan.upload=false
